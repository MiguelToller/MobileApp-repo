name: app_drift
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Dependências do Drift para persistência de dados
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.15
  path_provider: ^2.1.2
  path: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Ferramentas de geração de código
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true